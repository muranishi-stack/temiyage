<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手土産帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F3EFE3;
    --paper-dark: #EAE3D2;
    --ink: #2B2620;
    --ink-soft: #5A5346;
    --indigo: #24395C;
    --indigo-light: #3F5A87;
    --seal: #AE3B2E;
    --gold: #A6813A;
    --line: #D9D0BB;
    --white: #FBFAF6;
    --radius: 4px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,38,32,0.035) 1px, transparent 0);
    background-size: 18px 18px;
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  .app{
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  /* ---------- Header / spine ---------- */
  .hero{
    position: relative;
    display:flex;
    align-items:center;
    gap: 18px;
    padding: 22px 22px 22px 26px;
    background: var(--indigo);
    border-radius: var(--radius);
    color: var(--white);
    overflow: hidden;
    margin-bottom: 26px;
  }
  .hero::after{
    content:"";
    position:absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .hero-spine{
    writing-mode: vertical-rl;
    text-orientation: upright;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--gold);
    border-left: 1px solid rgba(255,255,255,0.25);
    padding-left: 12px;
    flex-shrink:0;
    align-self: stretch;
    display:flex;
    align-items:center;
  }
  .hero-title{
    font-family:'Shippori Mincho', serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.06em;
    margin: 0 0 4px;
  }
  .hero-sub{
    font-size: 12.5px;
    color: rgba(251,250,246,0.75);
    margin:0;
    letter-spacing: 0.04em;
  }
  .knot{ flex-shrink:0; margin-left:auto; opacity:0.9; }

  /* ---------- Tabs (index tabs like a planner) ---------- */
  .tabs{
    display:flex;
    gap: 8px;
    margin-bottom: -1px;
    position: relative;
    z-index: 2;
    padding-left: 4px;
  }
  .tab{
    font-family:'Shippori Mincho', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 10px 22px 12px;
    background: var(--paper-dark);
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-bottom: none;
    clip-path: polygon(6% 0, 94% 0, 100% 100%, 0% 100%);
    cursor: pointer;
    transition: background .15s ease, color .15s ease, transform .15s ease;
  }
  .tab:hover{ transform: translateY(-2px); }
  .tab.active{
    background: var(--white);
    color: var(--indigo);
    border-color: var(--line);
    box-shadow: 0 -2px 0 var(--gold) inset;
  }
  .tab .tab-icon{ margin-right:6px; }

  .panel-wrap{
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    padding: 26px 22px;
    position: relative;
    z-index:1;
  }

  .panel{ display:none; }
  .panel.active{ display:block; }

  h2.section-title{
    font-family:'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--indigo);
  }
  .section-desc{
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }

  /* ---------- Form ---------- */
  .form-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column: 1 / -1; }
  label{
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  input, select, textarea{
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
  }
  input:focus, select:focus, textarea:focus{
    outline: 2px solid var(--indigo-light);
    outline-offset: 1px;
  }
  textarea{ resize: vertical; min-height: 56px; font-family: inherit; }

  .btn{
    font-family: 'Shippori Mincho', serif;
    font-weight: 700;
    font-size: 14.5px;
    letter-spacing: 0.05em;
    border: none;
    border-radius: var(--radius);
    padding: 11px 22px;
    cursor: pointer;
    display: inline-flex;
    align-items:center;
    gap: 8px;
    transition: opacity .15s ease, transform .1s ease;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{ background: var(--indigo); color: var(--white); }
  .btn-primary:hover{ opacity:0.9; }
  .btn-seal{ background: var(--seal); color: var(--white); }
  .btn-ghost{
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 500;
    font-size: 13px;
    padding: 7px 14px;
  }
  .btn-ghost:hover{ background: var(--paper); }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }

  /* ---------- Loading (stamp animation) ---------- */
  .loading-row{
    display:flex; align-items:center; gap:12px;
    padding: 18px 4px;
    color: var(--ink-soft);
    font-size: 13.5px;
  }
  .stamp-spin{
    width: 26px; height:26px;
    border-radius: 50%;
    border: 3px solid var(--line);
    border-top-color: var(--seal);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .error-box{
    background: #FBEDEA;
    border: 1px solid #E3B3AA;
    color: #7A2A20;
    font-size: 13px;
    padding: 12px 14px;
    border-radius: var(--radius);
    margin: 10px 0;
  }

  /* ---------- Result cards ---------- */
  .results{ margin-top: 18px; display:flex; flex-direction:column; gap:14px; }
  .result-card{
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    background: var(--paper);
    position: relative;
  }
  .result-name{
    font-family: 'Shippori Mincho', serif;
    font-size: 16.5px;
    font-weight: 700;
    color: var(--indigo);
    margin: 0 0 6px;
  }
  .result-meta{
    display:flex; flex-wrap:wrap; gap: 8px 16px;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .result-meta span b{ color: var(--ink); font-weight:700; }
  .result-desc{ font-size: 13.5px; line-height:1.7; margin: 0 0 10px; }
  .result-actions{ display:flex; justify-content:flex-end; }

  /* ---------- Log list (timeline) ---------- */
  .log-add-toggle{ margin-bottom: 16px; }
  .log-form{
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 22px;
    background: var(--paper);
    display:none;
  }
  .log-form.open{ display:block; }
  .log-form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 4px; }

  .timeline{
    position: relative;
    padding-left: 22px;
    border-left: 2px solid var(--line);
  }
  .timeline-empty{
    color: var(--ink-soft);
    font-size: 13.5px;
    padding: 10px 0 10px 4px;
    border-left: none;
    margin-left: -22px;
  }
  .log-entry{
    position: relative;
    padding-bottom: 22px;
  }
  .log-entry:last-child{ padding-bottom: 0; }
  .log-entry::before{
    content:"";
    position:absolute;
    left: -28px; top: 4px;
    width: 12px; height:12px;
    border-radius: 50%;
    background: var(--seal);
    border: 2px solid var(--white);
    box-shadow: 0 0 0 1px var(--seal);
  }
  .log-date-badge{
    display:inline-block;
    font-family:'Shippori Mincho', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--seal);
    border: 1px solid var(--seal);
    border-radius: 20px;
    padding: 2px 12px;
    margin-bottom: 6px;
  }
  .log-item-name{
    font-family:'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 3px;
  }
  .log-item-sub{
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  .log-item-memo{
    font-size: 13px;
    line-height: 1.6;
    background: var(--paper);
    border-left: 2px solid var(--gold);
    padding: 8px 10px;
    border-radius: 2px;
    margin: 0 0 8px;
    white-space: pre-wrap;
  }
  .log-item-actions{ display:flex; gap:8px; }
  .icon-btn{
    background:none; border:none; cursor:pointer;
    color: var(--ink-soft);
    font-size: 12px;
    padding: 3px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
  }
  .icon-btn:hover{ background: var(--paper); color: var(--ink); }

  footer.note{
    text-align:center;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 24px;
    opacity: 0.8;
  }

  @media (max-width: 560px){
    .form-grid{ grid-template-columns: 1fr; }
    .hero-title{ font-size: 21px; }
    .hero-spine{ font-size: 11px; }
    .knot svg{ width: 44px; height:44px; }
    .tab{ padding: 9px 14px 11px; font-size: 13.5px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="hero-spine">御 土 産 帳</div>
    <div>
      <p class="hero-title">手土産帳</p>
      <p class="hero-sub">最新のお手土産を探し、渡した記録をのこす</p>
    </div>
    <div class="knot" aria-hidden="true">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <path d="M10 28c0-8 6-14 14-14s14 6 14 14-6 14-14 14" stroke="#A6813A" stroke-width="2.5" fill="none"/>
        <path d="M46 28c0 8-6 14-14 14s-14-6-14-14 6-14 14-14" stroke="#FBFAF6" stroke-width="2.5" fill="none" opacity="0.75"/>
        <circle cx="28" cy="28" r="4" fill="#AE3B2E"/>
      </svg>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-btn-search" onclick="switchTab('search')">探す</button>
    <button class="tab" id="tab-btn-log" onclick="switchTab('log')">記録帳</button>
  </div>

  <div class="panel-wrap">

    <!-- ================= SEARCH PANEL ================= -->
    <section class="panel active" id="panel-search">
      <h2 class="section-title">最新のお手土産を探す</h2>
      <p class="section-desc">条件を入れると、Google・楽天市場・Amazonなどで一括検索できるリンクを作ります。</p>

      <div class="form-grid">
        <div class="field">
          <label for="s-occasion">用途</label>
          <select id="s-occasion">
            <option value="帰省・実家への手土産">帰省・実家への手土産</option>
            <option value="ビジネスの手土産・ご挨拶">ビジネスの手土産・ご挨拶</option>
            <option value="お礼・お詫び">お礼・お詫び</option>
            <option value="季節の挨拶・お中元お歳暮">季節の挨拶・お中元お歳暮</option>
            <option value="友人・知人への手土産">友人・知人への手土産</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field">
          <label for="s-budget">予算の目安</label>
          <select id="s-budget">
            <option value="1000〜2000円">1,000〜2,000円</option>
            <option value="2000〜3000円">2,000〜3,000円</option>
            <option value="3000〜5000円">3,000〜5,000円</option>
            <option value="5000円以上">5,000円以上</option>
            <option value="指定なし">指定なし</option>
          </select>
        </div>
        <div class="field">
          <label for="s-region">地域・購入場所(任意)</label>
          <input type="text" id="s-region" placeholder="例: 東京駅、大阪、オンライン可 など">
        </div>
        <div class="field">
          <label for="s-count">人数・相手(任意)</label>
          <input type="text" id="s-count" placeholder="例: 取引先の部署、5〜6人分 など">
        </div>
        <div class="field full">
          <label for="s-notes">好み・条件(任意)</label>
          <textarea id="s-notes" placeholder="例: 日持ちするもの、個包装、老舗の和菓子、センスがいいもの など"></textarea>
        </div>
      </div>

      <button class="btn btn-primary" id="search-btn" onclick="buildSearchLinks()">
        検索リンクを作る
      </button>

      <div id="search-status"></div>
      <div class="results" id="results"></div>
    </section>

    <!-- ================= LOG PANEL ================= -->
    <section class="panel" id="panel-log">
      <h2 class="section-title">渡した記録帳</h2>
      <p class="section-desc">いつ・誰に・何を渡したかをメモしておけます。</p>

      <div class="log-add-toggle">
        <button class="btn btn-seal" id="log-toggle-btn" onclick="toggleLogForm()">+ 記録を追加</button>
      </div>

      <div class="log-form" id="log-form">
        <div class="form-grid">
          <div class="field">
            <label for="l-date">日付</label>
            <input type="date" id="l-date">
          </div>
          <div class="field">
            <label for="l-company">会社名(任意)</label>
            <input type="text" id="l-company" placeholder="例: 株式会社○○">
          </div>
          <div class="field">
            <label for="l-name">名前</label>
            <input type="text" id="l-name" placeholder="例: ○○様、営業部の皆さま">
          </div>
          <div class="field">
            <label for="l-item">品物</label>
            <input type="text" id="l-item" placeholder="例: 東京バナナ">
          </div>
          <div class="field">
            <label for="l-price">金額(任意)</label>
            <input type="text" id="l-price" placeholder="例: 2,500円">
          </div>
          <div class="field">
            <label for="l-occasion">用途(任意)</label>
            <input type="text" id="l-occasion" placeholder="例: ご挨拶、お礼">
          </div>
          <div class="field">
            <label for="l-url">商品URL(任意)</label>
            <input type="url" id="l-url" placeholder="https://...">
          </div>
          <div class="field full">
            <label for="l-memo">メモ(任意)</label>
            <textarea id="l-memo" placeholder="喜ばれたポイントや次回への申し送りなど"></textarea>
          </div>
        </div>
        <div class="log-form-actions">
          <button class="btn btn-ghost" onclick="cancelLogForm()">キャンセル</button>
          <button class="btn btn-primary" onclick="saveLogEntry()">記録する</button>
        </div>
      </div>

      <div id="log-status"></div>
      <div class="timeline" id="timeline">
        <div class="timeline-empty">読み込み中...</div>
      </div>
    </section>

  </div>

  <footer class="note">手土産帳 ー 検索は各サイトの実際の検索結果を新しいタブで開きます。</footer>
</div>

<script>
/* ---------------- Tabs ---------------- */
function switchTab(name){
  document.getElementById('panel-search').classList.toggle('active', name==='search');
  document.getElementById('panel-log').classList.toggle('active', name==='log');
  document.getElementById('tab-btn-search').classList.toggle('active', name==='search');
  document.getElementById('tab-btn-log').classList.toggle('active', name==='log');
}

/* ---------------- Search (real search engines) ---------------- */
const SEARCH_ENGINES = [
  {
    key: 'google',
    label: 'Google で検索',
    color: '#4285F4',
    buildUrl: q => `https://www.google.com/search?q=${encodeURIComponent(q)}`
  },
  {
    key: 'rakuten',
    label: '楽天市場で検索',
    color: '#BF0000',
    buildUrl: q => `https://search.rakuten.co.jp/search/mall/${encodeURIComponent(q)}/`
  },
  {
    key: 'amazon',
    label: 'Amazon で検索',
    color: '#FF9900',
    buildUrl: q => `https://www.amazon.co.jp/s?k=${encodeURIComponent(q)}`
  },
  {
    key: 'yahoo',
    label: 'Yahoo!ショッピングで検索',
    color: '#7B00A5',
    buildUrl: q => `https://shopping.yahoo.co.jp/search?p=${encodeURIComponent(q)}`
  }
];

function buildSearchLinks(){
  const statusEl = document.getElementById('search-status');
  const resultsEl = document.getElementById('results');

  const occasion = document.getElementById('s-occasion').value;
  const budget = document.getElementById('s-budget').value;
  const region = document.getElementById('s-region').value.trim();
  const count = document.getElementById('s-count').value.trim();
  const notes = document.getElementById('s-notes').value.trim();

  const queryParts = ['手土産', occasion];
  if(budget && budget !== '指定なし') queryParts.push(budget);
  if(region) queryParts.push(region);
  if(count) queryParts.push(count);
  if(notes) queryParts.push(notes);
  const query = queryParts.filter(Boolean).join(' ');

  statusEl.innerHTML = '';
  resultsEl.innerHTML = `
    <div class="result-card">
      <p class="result-name">検索ワード</p>
      <p class="result-desc">${escapeHtml(query)}</p>
      <div class="result-actions" style="flex-wrap:wrap; gap:10px; justify-content:flex-start;">
        ${SEARCH_ENGINES.map(engine => `
          <a class="btn btn-ghost" style="text-decoration:none; border-color:${engine.color};"
             href="${engine.buildUrl(query)}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(engine.label)}
          </a>
        `).join('')}
      </div>
    </div>
    <div class="result-card">
      <p class="result-desc" style="margin:0;">気に入ったものが見つかったら、下の「記録帳」タブから記録しておきましょう。</p>
      <div class="result-actions">
        <button class="btn btn-ghost" onclick="goToLogForm()">記録帳へ</button>
      </div>
    </div>
  `;
}

function goToLogForm(){
  switchTab('log');
  openLogForm();
  document.getElementById('l-item').focus();
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------------- Log ---------------- */
let editingId = null;

function toggleLogForm(){
  const form = document.getElementById('log-form');
  if(form.classList.contains('open')){
    cancelLogForm();
  }else{
    openLogForm();
  }
}

function openLogForm(){
  const form = document.getElementById('log-form');
  form.classList.add('open');
  if(!document.getElementById('l-date').value){
    document.getElementById('l-date').value = new Date().toISOString().slice(0,10);
  }
}

function cancelLogForm(){
  const form = document.getElementById('log-form');
  form.classList.remove('open');
  editingId = null;
  ['l-date','l-company','l-name','l-item','l-price','l-occasion','l-url','l-memo'].forEach(id => document.getElementById(id).value = '');
}

async function loadLogEntries(){
  try{
    const res = await window.storage.get('log-entries', false);
    return res ? JSON.parse(res.value) : [];
  }catch(e){
    return [];
  }
}

async function saveLogEntries(entries){
  const statusEl = document.getElementById('log-status');
  try{
    const result = await window.storage.set('log-entries', JSON.stringify(entries), false);
    if(!result){
      statusEl.innerHTML = '<div class="error-box">保存に失敗しました。もう一度お試しください。</div>';
    }else{
      statusEl.innerHTML = '';
    }
  }catch(e){
    console.error(e);
    statusEl.innerHTML = '<div class="error-box">保存に失敗しました。もう一度お試しください。</div>';
  }
}

async function saveLogEntry(){
  const date = document.getElementById('l-date').value;
  const company = document.getElementById('l-company').value.trim();
  const name = document.getElementById('l-name').value.trim();
  const item = document.getElementById('l-item').value.trim();
  const price = document.getElementById('l-price').value.trim();
  const occasion = document.getElementById('l-occasion').value.trim();
  const url = document.getElementById('l-url').value.trim();
  const memo = document.getElementById('l-memo').value.trim();

  if(!date || !item){
    document.getElementById('log-status').innerHTML = '<div class="error-box">日付と品物は入力してください。</div>';
    return;
  }

  const entries = await loadLogEntries();
  if(editingId){
    const target = entries.find(e => e.id === editingId);
    if(target){
      Object.assign(target, { date, company, name, item, price, occasion, url, memo });
    }
  }else{
    entries.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      date, company, name, item, price, occasion, url, memo
    });
  }
  await saveLogEntries(entries);
  cancelLogForm();
  renderTimeline(entries);
}

function editLogEntry(id){
  loadLogEntries().then(entries => {
    const target = entries.find(e => e.id === id);
    if(!target) return;
    editingId = id;
    openLogForm();
    document.getElementById('l-date').value = target.date || '';
    document.getElementById('l-company').value = target.company || '';
    document.getElementById('l-name').value = target.name || target.recipient || '';
    document.getElementById('l-item').value = target.item || '';
    document.getElementById('l-price').value = target.price || '';
    document.getElementById('l-occasion').value = target.occasion || '';
    document.getElementById('l-url').value = target.url || '';
    document.getElementById('l-memo').value = target.memo || '';
    window.scrollTo({ top: document.getElementById('log-form').offsetTop - 20, behavior: 'smooth' });
  });
}

async function deleteLogEntry(id){
  const entries = await loadLogEntries();
  const next = entries.filter(e => e.id !== id);
  await saveLogEntries(next);
  renderTimeline(next);
}

function renderTimeline(entries){
  const el = document.getElementById('timeline');
  if(!entries || entries.length === 0){
    el.innerHTML = '<div class="timeline-empty">まだ記録がありません。「+ 記録を追加」から最初のメモを残しましょう。</div>';
    return;
  }
  const sorted = [...entries].sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  el.innerHTML = sorted.map(e => {
    const who = [e.company, (e.name || e.recipient)].filter(Boolean).join(' ／ ');
    const subParts = [];
    if(who) subParts.push('相手: ' + escapeHtml(who));
    if(e.occasion) subParts.push('用途: ' + escapeHtml(e.occasion));
    if(e.price) subParts.push('金額: ' + escapeHtml(e.price));
    return `
    <div class="log-entry">
      <span class="log-date-badge">${escapeHtml(e.date || '')}</span>
      <p class="log-item-name">${escapeHtml(e.item || '')}</p>
      ${subParts.length ? `<p class="log-item-sub">${subParts.join(' ・ ')}</p>` : ''}
      ${e.url ? `<p class="log-item-sub"><a href="${escapeHtml(e.url)}" target="_blank" rel="noopener noreferrer" style="color:var(--indigo);">${escapeHtml(e.url)}</a></p>` : ''}
      ${e.memo ? `<p class="log-item-memo">${escapeHtml(e.memo)}</p>` : ''}
      <div class="log-item-actions">
        <button class="icon-btn" onclick="editLogEntry('${e.id}')">編集</button>
        <button class="icon-btn" onclick="deleteLogEntry('${e.id}')">削除</button>
      </div>
    </div>
  `;
  }).join('');
}

/* ---------------- Init ---------------- */
(async function init(){
  const entries = await loadLogEntries();
  renderTimeline(entries);
})();
</script>
</body>
